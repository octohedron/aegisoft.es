<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IAM delivery workflow</title>
  <desc id="desc">Stylized monochrome five-step IAM workflow with outputs.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#343434"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg2)"/>
  <text x="86" y="95" fill="#ffffff" font-size="46" font-family="Inter, Arial, sans-serif" font-weight="800">IAM Delivery Workflow</text>
  <text x="86" y="128" fill="#d3d3d3" font-size="22" font-family="Inter, Arial, sans-serif">From assessment to operations handover, with decision-grade outputs</text>
  <g>
    <rect x="80" y="178" width="188" height="104" rx="18" fill="url(#chip)" stroke="#f2f2f2" stroke-opacity="0.32"/>
    <text x="117" y="240" fill="#ffffff" font-size="29" font-family="Inter, Arial, sans-serif" font-weight="700">Assess</text>
  </g>
  <g>
    <rect x="300" y="178" width="188" height="104" rx="18" fill="url(#chip)" stroke="#f2f2f2" stroke-opacity="0.32"/>
    <text x="343" y="240" fill="#ffffff" font-size="29" font-family="Inter, Arial, sans-serif" font-weight="700">Design</text>
  </g>
  <g>
    <rect x="520" y="178" width="188" height="104" rx="18" fill="url(#chip)" stroke="#f2f2f2" stroke-opacity="0.32"/>
    <text x="548" y="240" fill="#ffffff" font-size="29" font-family="Inter, Arial, sans-serif" font-weight="700">Implement</text>
  </g>
  <g>
    <rect x="740" y="178" width="188" height="104" rx="18" fill="url(#chip)" stroke="#f2f2f2" stroke-opacity="0.32"/>
    <text x="771" y="240" fill="#ffffff" font-size="29" font-family="Inter, Arial, sans-serif" font-weight="700">Validate</text>
  </g>
  <g>
    <rect x="960" y="178" width="160" height="104" rx="18" fill="#f4f4f4" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.34"/>
    <text x="986" y="240" fill="#ffffff" font-size="29" font-family="Inter, Arial, sans-serif" font-weight="700">Operate</text>
  </g>
  <g stroke="#e9e9e9" stroke-opacity="0.4" stroke-width="3.2" filter="url(#softGlow)">
    <path d="M268 230 L300 230"/>
    <path d="M488 230 L520 230"/>
    <path d="M708 230 L740 230"/>
    <path d="M928 230 L960 230"/>
  </g>
  <rect x="80" y="334" width="1040" height="276" rx="22" fill="#191919" stroke="#ffffff" stroke-opacity="0.26"/>
  <text x="120" y="392" fill="#ffffff" font-size="33" font-family="Inter, Arial, sans-serif" font-weight="700">Output Examples</text>
  <text x="120" y="444" fill="#e2e2e2" font-size="24" font-family="Inter, Arial, sans-serif">- Architecture decision records and rollout wave plans</text>
  <text x="120" y="488" fill="#e2e2e2" font-size="24" font-family="Inter, Arial, sans-serif">- Risk register with mitigations and rollback strategy</text>
  <text x="120" y="532" fill="#e2e2e2" font-size="24" font-family="Inter, Arial, sans-serif">- Compliance control mapping and audit evidence packs</text>
  <text x="120" y="576" fill="#e2e2e2" font-size="24" font-family="Inter, Arial, sans-serif">- Operations runbooks and ownership handover</text>
</svg>
