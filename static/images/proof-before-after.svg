<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Before and after IAM stack</title>
  <desc id="desc">Monochrome comparison between fragmented legacy IAM and unified modern IAM.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#303030"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg3)"/>

  <text x="130" y="92" fill="#ffffff" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="800">Before</text>
  <text x="708" y="92" fill="#ffffff" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="800">After</text>

  <rect x="86" y="128" width="440" height="504" rx="22" fill="#1a1a1a" stroke="#f2f2f2" stroke-opacity="0.25"/>
  <rect x="676" y="128" width="440" height="504" rx="22" fill="#1a1a1a" stroke="#f2f2f2" stroke-opacity="0.25"/>

  <g>
    <rect x="124" y="182" width="166" height="92" rx="12" fill="url(#card3)" stroke="#f5f5f5" stroke-opacity="0.25"/>
    <rect x="320" y="182" width="166" height="92" rx="12" fill="url(#card3)" stroke="#f5f5f5" stroke-opacity="0.25"/>
    <rect x="124" y="310" width="166" height="92" rx="12" fill="url(#card3)" stroke="#f5f5f5" stroke-opacity="0.25"/>
    <rect x="320" y="310" width="166" height="92" rx="12" fill="url(#card3)" stroke="#f5f5f5" stroke-opacity="0.25"/>
    <rect x="222" y="438" width="166" height="92" rx="12" fill="url(#card3)" stroke="#f5f5f5" stroke-opacity="0.25"/>
    <text x="146" y="236" fill="#ffffff" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="600">Legacy IdP A</text>
    <text x="342" y="236" fill="#ffffff" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="600">Legacy IdP B</text>
    <text x="152" y="364" fill="#ffffff" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="600">Manual Access</text>
    <text x="346" y="364" fill="#ffffff" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="600">Siloed MFA</text>
    <text x="258" y="492" fill="#ffffff" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="600">Limited Logs</text>
  </g>

  <g>
    <rect x="730" y="222" width="332" height="118" rx="14" fill="#2a2a2a" stroke="#ffffff" stroke-opacity="0.28"/>
    <rect x="730" y="380" width="332" height="118" rx="14" fill="#f5f5f5" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.32"/>
    <text x="785" y="292" fill="#ffffff" font-size="36" font-family="Inter, Arial, sans-serif" font-weight="700">Unified IAM Core</text>
    <text x="772" y="450" fill="#ffffff" font-size="36" font-family="Inter, Arial, sans-serif" font-weight="700">Automated Controls</text>
    <text x="736" y="566" fill="#e6e6e6" font-size="26" font-family="Inter, Arial, sans-serif" font-weight="600">Fewer incidents - Faster onboarding - Better audits</text>
  </g>

  <path d="M548 350 L640 350" stroke="#f5f5f5" stroke-opacity="0.65" stroke-width="5"/>
  <polygon points="640,350 620,338 620,362" fill="#f5f5f5" fill-opacity="0.9"/>
</svg>
